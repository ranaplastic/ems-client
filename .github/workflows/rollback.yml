name: Rollback GitHub Pages

# Mirrors the backend rollback workflow, adapted for GitHub Pages.
#   Automatic: re-deploy the previous commit if a production Deploy fails.
#   Manual:    re-deploy a specific ref (tag/branch/SHA).
on:
  workflow_run:
    workflows: [Deploy to GitHub Pages]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (tag/branch/SHA) to redeploy. Defaults to the previous commit on main.'
        required: false
        default: ''

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  rollback:
    name: Rollback
    # Run on manual dispatch, or automatically only when Deploy failed.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve rollback target
        id: target
        run: |
          INPUT_REF="${{ github.event.inputs.ref }}"
          if [ -n "$INPUT_REF" ]; then
            TARGET="$INPUT_REF"
          else
            # Last known-good build = the commit before the current main HEAD.
            TARGET="$(git rev-parse origin/main~1)"
          fi
          echo "Rolling back to: $TARGET"
          echo "ref=$TARGET" >> "$GITHUB_OUTPUT"

      - name: Checkout target ref
        run: git checkout ${{ steps.target.outputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_PROFILE: prod
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_STORAGE_SECRET: ${{ secrets.VITE_STORAGE_SECRET }}
          VITE_USE_MOCK: ${{ vars.VITE_USE_MOCK }}
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
